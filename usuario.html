<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="compra-entradas">
        <a href="">Compra tus entradas</a>
    </div>

    <header>

        <!-- LOGO FUNDACION CANAL -->
        <img class="LOGO" src="media/LOGO_CANAL.webp" alt="Logo">

        <!-- Menú desktop -->
        <nav class="nav-desktop">
            <ul class="menu-desktop">
                <li><a href="#">Sobre nosotros</a></li>
                <li><a href="#">Artistas</a></li>
                <li><a href="#">Tienda</a></li>
                <li><a href="#">Tickets</a></li>
            </ul>
        </nav>

        <div class="header-icons">
            <a href=""><img class="carrito_compra" src="media/icono_compra.webp" alt="carrito_compra"></a>
            
            <a href=""><img class="user" src="media/icono_user.webp" alt="User"></a>
        </div>

     <!-- Icono hamnburguesa ( y x) (ADRINA)-->
        <input type="checkbox" id="sideMenu" class="side-menu">
        <label class="hamb" for="sideMenu">
            <i class="fa-solid fa-bars"></i>
            <i class="fa-solid fa-xmark"></i>
        </label>

        <!-- MENU CELULAR -->
        <nav class="nav-mobile">
            <ul class="menu-mobile">
                <li><a href="#">Sobre nosotros</a></li>
                <li><a href="#">Artistas</a></li>
                <li><a href="#">Tienda</a></li>
                <li><a href="#">Tickets</a></li>
            </ul>
        </nav>
    </header>

     <!-- TIRA DE USUARIO -->
    <div class="usuario">
         <div class="usuario-track">
             <span> Usuario </span>
        </div>
    </div>


<section class="container-registro">
    <form id="registro">
        <div class="form-item">
            <input type="text" placeholder="Nombre completo..." required>
        </div>

        <div class="form-item">
            <input type="email" placeholder="Correo electrónico..." required>
        </div>

        <div class="form-item">
            <input type="tel" placeholder="Número de teléfono...">
        </div>

        <div class="form-item">
            <input type="text" placeholder="Nombre de usuario..." required>
        </div>

        <div class="form-item">
            <input type="password" placeholder="Contraseña..." required>
        </div>

        <div class="form-aceptar">
            <input type="checkbox" id="acepto" required>
            <label for="acepto">
                He leído y acepto las Condiciones de Uso y la Política de Privacidad. Responsable: Fundación Canal. Finalidad: Gestionar tu cuenta de usuario y enviarte novedades sobre exposiciones y actividades. Derechos: Puedes acceder, rectificar y suprimir tus datos en esta web.
            </label>
        </div>

        <button type="submit" class="btn-enviar">REGÍSTRATE</button>
    </form>
</section>

    <div id="usuario">
        <img src="media/foto usuario.jpeg" alt="#">
    </div>

    
</body>
</html>
